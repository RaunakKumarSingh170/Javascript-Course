<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variable</title>
  </head>
  <body>
    <script>

      let var1 = 3;
      console.log(var1);

      let calculation = 2 + 2;
      console.log(calculation);
      console.log(calculation * 999);

      let lol = calculation * 9999;
      console.log(lol);
      var1 += 9;
      console.log(var1);

      const var2=99;
      console.log(var2);
     
      var var3=999;
      console.log(var3);

    </script>
  </body>
</html>
